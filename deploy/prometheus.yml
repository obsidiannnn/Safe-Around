global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    environment: production
    service: safearound

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: safearound-api
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  - job_name: safearound-worker
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
