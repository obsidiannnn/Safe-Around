_format_version: "3.0"
_transform: true

# =============================================================================
# Kong Declarative Configuration – SafeAround API Gateway
# Apply with: deck gateway sync kong.yml
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Primary REST API
  # ---------------------------------------------------------------------------
  - name: safearound-api
    url: http://backend:8080
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    retries: 3

    routes:
      - name: api-routes
        paths:
          - /api/v1
        strip_path: false
        protocols:
          - http
          - https

    plugins:

      # Rate limiting (Redis-backed per consumer)
      - name: rate-limiting
        config:
          minute: 1000
          hour: 30000
          day: 500000
          policy: redis
          redis_host: redis
          redis_port: 6379
          redis_timeout: 2000
          fault_tolerant: true
          hide_client_headers: false

      # CORS
      - name: cors
        config:
          origins:
            - "https://safearound.app"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-RateLimit-Limit
            - X-RateLimit-Remaining
            - X-RateLimit-Reset
          credentials: true
          max_age: 3600

      # JWT validation (offloaded from app)
      - name: jwt
        config:
          key_claim_name: user_id
          secret_is_base64: false
          run_on_preflight: false

      # Request size guard (10 MB max)
      - name: request-size-limiting
        config:
          allowed_payload_size: 10
          size_unit: megabytes

      # Prometheus metrics per consumer
      - name: prometheus
        config:
          per_consumer: true
          status_code_metrics: true
          latency_metrics: true
          upstream_health_metrics: true
          bandwidth_metrics: true

      # Response transformer – add security headers
      - name: response-transformer
        config:
          add:
            headers:
              - "X-Content-Type-Options: nosniff"
              - "X-Frame-Options: DENY"
              - "Strict-Transport-Security: max-age=31536000; includeSubDomains"

      # Request ID tracing
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid#counter
          echo_downstream: true

  # ---------------------------------------------------------------------------
  # WebSocket upgrade
  # ---------------------------------------------------------------------------
  - name: safearound-websocket
    url: http://backend:8080
    routes:
      - name: ws-route
        paths:
          - /ws
        strip_path: false
        protocols:
          - http
          - https
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379

  # ---------------------------------------------------------------------------
  # Public health/metrics (no auth)
  # ---------------------------------------------------------------------------
  - name: safearound-public
    url: http://backend:8080
    routes:
      - name: health-routes
        paths:
          - /health
          - /metrics
        strip_path: false
        protocols:
          - http
          - https
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

# =============================================================================
# Consumers (JWT credential holders)
# =============================================================================
consumers:
  - username: mobile-app
    custom_id: mobile
    jwt_secrets:
      - key: mobile_jwt_key
        secret: "${JWT_SECRET}"

  - username: web-app
    custom_id: web
    jwt_secrets:
      - key: web_jwt_key
        secret: "${JWT_SECRET}"

# =============================================================================
# Global plugins (applied to all services)
# =============================================================================
plugins:
  # IP Block list (update blocked IPs here)
  - name: ip-restriction
    config:
      deny: []
      allow: []
      status: 403
      message: "Your IP address is not allowed."

  # Bot detection
  - name: bot-detection
    config:
      allow:
        - chrome
        - firefox
        - safari
        - postman  # allow during development
      deny: []
