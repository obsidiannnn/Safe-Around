input {
  beats { port => 5044 }
  tcp {
    port => 5001
    codec => json_lines
  }
}

filter {
  if [service] == "safearound-api" or [service] == "safearound-worker" {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "safearound-logs" }
    }
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "safearound-logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }
}
