# deploy/nginx/safearound.conf

server {
    listen 80;
    listen [::]:80;
    server_name safearound.app www.safearound.app; # Replace with your domain

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name safearound.app www.safearound.app; # Replace with your domain

    ssl_certificate /etc/letsencrypt/live/safearound.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safearound.app/privkey.pem;

    # Backend API Proxy
    location /api/v1/ {
        proxy_pass http://backend:8080/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket Proxy
    location /ws/crime {
        proxy_pass http://backend:8080/ws/crime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Prometheus Proxy (Optional/Internal)
    location /metrics {
        auth_basic "Metrics Storage";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://prometheus:9090/metrics;
    }
}
