groups:
  - name: safearound_alerts
    interval: 30s
    rules:

      # ---- 1. High HTTP Error Rate --------------------------------------------
      - alert: HighErrorRate
        expr: |
          rate(safearound_http_requests_total{status=~"5.."}[5m])
          /
          rate(safearound_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: safearound-api
        annotations:
          summary: "High HTTP 5xx error rate (>5%)"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."
          runbook: "Check app logs: journalctl -u safearound-api -n 200"

      # ---- 2. Slow P95 API Latency -------------------------------------------
      - alert: SlowAPIResponses
        expr: |
          histogram_quantile(0.95,
            rate(safearound_http_request_duration_seconds_bucket[5m])
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: safearound-api
        annotations:
          summary: "API P95 latency exceeds 1 second"
          description: "P95 response time is {{ $value | humanizeDuration }} (threshold: 1s)."

      # ---- 3. Database Connection Pool Near Exhaustion -----------------------
      - alert: DatabasePoolExhausted
        expr: safearound_db_connections_active > 20
        for: 5m
        labels:
          severity: critical
          service: safearound-api
        annotations:
          summary: "Database connection pool nearly full"
          description: "{{ $value }} active DB connections (pool max: 25)."

      # ---- 4. Low Redis Cache Hit Rate ---------------------------------------
      - alert: LowCacheHitRate
        expr: |
          rate(safearound_cache_hits_total[10m])
          /
          (rate(safearound_cache_hits_total[10m]) + rate(safearound_cache_misses_total[10m]))
          < 0.70
        for: 15m
        labels:
          severity: warning
          service: safearound-api
        annotations:
          summary: "Redis cache hit rate below 70%"
          description: "Cache hit rate is {{ $value | humanizePercentage }} (threshold: 70%)."

      # ---- 5. High Notification Failure Rate ---------------------------------
      - alert: HighNotificationFailureRate
        expr: |
          rate(safearound_notifications_failed_total[10m])
          /
          (rate(safearound_notifications_sent_total[10m]) + rate(safearound_notifications_failed_total[10m]))
          > 0.10
        for: 5m
        labels:
          severity: warning
          service: safearound-api
        annotations:
          summary: "Notification failure rate above 10%"
          description: "Failure rate is {{ $value | humanizePercentage }} (threshold: 10%)."

      # ---- 6. Active Emergency Alerts Spike ----------------------------------
      - alert: AlertSpike
        expr: safearound_active_alerts > 20
        for: 2m
        labels:
          severity: critical
          service: safearound-api
        annotations:
          summary: "Unusual spike in active emergency alerts"
          description: "{{ $value }} active alerts — possible incident or abuse."

      # ---- 7. WebSocket Connection Drop --------------------------------------
      - alert: WebSocketConnectionDrop
        expr: delta(safearound_websocket_connections[5m]) < -50
        for: 3m
        labels:
          severity: warning
          service: safearound-api
        annotations:
          summary: "Large WebSocket connection drop"
          description: "WebSocket connections dropped by {{ $value }} in 5 minutes."

      # ---- 8. Cron Job Failures ---------------------------------------------
      - alert: CronJobFailure
        expr: increase(safearound_job_executions_total{status="failure"}[1h]) > 0
        for: 0m
        labels:
          severity: warning
          service: safearound-worker
        annotations:
          summary: "Background cron job failed"
          description: "Job {{ $labels.job_name }} failed {{ $value }} time(s) in the last hour."
