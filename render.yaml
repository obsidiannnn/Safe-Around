services:
  # Backend API Service
  - type: web
    name: safearound-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SERVER_PORT
        value: 8000
      - key: GIN_MODE
        value: release
      - key: ENVIRONMENT
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 168h
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: FCM_SERVER_KEY
        sync: false
    healthCheckPath: /health/ping

  # Crime Pipeline Background Worker
  - type: worker
    name: safearound-crime-pipeline
    runtime: docker
    dockerfilePath: ./crime-pipeline/Dockerfile
    dockerContext: ./crime-pipeline
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: PIPELINE_INTERVAL_MINUTES
        value: 15
