# =============================================================================
# SafeAround – Kubernetes Deployment
# kubectl apply -f k8s/
# =============================================================================

# --- Backend Deployment -------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safearound-backend
  labels:
    app: safearound
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: safearound
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: safearound
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: safearound/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: safearound-config
            - secretRef:
                name: safearound-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

---
# --- Background Worker Deployment ---------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safearound-worker
  labels:
    app: safearound
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safearound
      component: worker
  template:
    metadata:
      labels:
        app: safearound
        component: worker
    spec:
      containers:
        - name: worker
          image: safearound/worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: safearound-config
            - secretRef:
                name: safearound-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "250m"

---
# --- Horizontal Pod Autoscaler ------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: safearound-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: safearound-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
