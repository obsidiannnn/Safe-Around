# =============================================================================
# SafeAround – Kubernetes ConfigMap (non-secret configuration)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: safearound-config
  labels:
    app: safearound
data:
  # Server
  SERVER_PORT: "8080"
  GIN_MODE: "release"
  ENVIRONMENT: "production"

  # Database (host/port injected by service name)
  DB_HOST: "safearound-postgres"
  DB_PORT: "5432"
  DB_NAME: "safearound_prod"
  DB_USER: "safearound_user"
  DB_SSLMODE: "disable"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"

  # Redis
  REDIS_HOST: "safearound-redis"
  REDIS_PORT: "6379"
  REDIS_POOL_SIZE: "10"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Feature flags
  DEFAULT_SUBSCRIPTION_TIER: "free"
  MAX_UPLOAD_SIZE: "10485760"
  ALERT_RADIUS_INCREMENT: "100"

---
# =============================================================================
# Kubernetes Secret (base64-encoded values, use k8s native secret management
# or Sealed Secrets / Vault in production)
# =============================================================================
# Replace placeholder values with: echo -n 'secret' | base64
apiVersion: v1
kind: Secret
metadata:
  name: safearound-secrets
  labels:
    app: safearound
type: Opaque
stringData:
  DB_PASSWORD: "changeme"
  JWT_SECRET: "changeme_min_32_chars_xxxxxxxxxxxxxxx"
  GOOGLE_MAPS_API_KEY: "AIza..."
  FCM_SERVER_KEY: "AAAA..."
  TWILIO_ACCOUNT_SID: "ACxxx..."
  TWILIO_AUTH_TOKEN: "xxx..."
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  GRAFANA_PASSWORD: "safearound123"
