# =============================================================================
# SafeAround – Kubernetes Services
# =============================================================================

# Backend ClusterIP (Kong proxy calls this)
apiVersion: v1
kind: Service
metadata:
  name: safearound-backend
  labels:
    app: safearound
    component: backend
spec:
  type: ClusterIP
  selector:
    app: safearound
    component: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP

---
# Backend NodePort for direct dev access
apiVersion: v1
kind: Service
metadata:
  name: safearound-backend-np
  labels:
    app: safearound
    component: backend
spec:
  type: NodePort
  selector:
    app: safearound
    component: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
