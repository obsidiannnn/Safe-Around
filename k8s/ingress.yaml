# =============================================================================
# SafeAround – Kubernetes Ingress (NGINX)
# Requires: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/...
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safearound-ingress
  labels:
    app: safearound
  annotations:
    # NGINX-specific
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/rewrite-target: /
    # TLS / cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.safearound.app
        - ws.safearound.app
      secretName: safearound-tls
  rules:
    # REST API
    - host: api.safearound.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: safearound-backend
                port:
                  number: 8080

    # WebSocket endpoint
    - host: ws.safearound.app
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: safearound-backend
                port:
                  number: 8080
