root = "."
tmp_dir = "tmp"

[build]
# Build the binary into tmp directory
cmd = "go build -o ./tmp/main ./cmd/api/main.go"
bin = "./tmp/main"
# Delay after starting the binary
delay = 1000
# Directories to ignore
exclude_dir = ["vendor", "tests", "tmp", "docs"]
# Files to ignore
exclude_file = []
# Extensions to watch
include_ext = ["go", "tpl", "tmpl", "html", "env"]

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = false

[misc]
clean_on_exit = true
