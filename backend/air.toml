root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/api/main.go"
bin = "./tmp/main"
delay = 1000
exclude_dir = ["vendor", "tests", "tmp"]
exclude_file = []
include_ext = ["go", "tpl", "tmpl", "html"]

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = false

[misc]
clean_on_exit = true
