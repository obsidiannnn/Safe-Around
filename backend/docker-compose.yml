version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: safearound_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-safearound_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password}
      POSTGRES_DB: ${DB_NAME:-safearound_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - safearound_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-safearound_user} -d ${DB_NAME:-safearound_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: safearound_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - safearound_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: safearound_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@safearound.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - safearound_network
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  safearound_network:
    driver: bridge
